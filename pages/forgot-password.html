<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot Password | GPREC</title>
    <meta name="description" content="Reset your GPREC portal password by verifying your identity.">
    <link rel="icon" href="https://www.gprec.ac.in/wp-content/uploads/2017/08/fav.png" sizes="32x32">
    <link rel="stylesheet" href="../styles.css?v=20260722-29">
  </head>
  <body class="login-page">
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-key" viewBox="0 0 24 24"><path d="M14 8a5 5 0 1 0-1.4 3.5L21 20v-4h-4v-4h-4l-.4-.5A5 5 0 0 0 14 8Z"/></symbol>
    </svg>
    <header class="login-header">
      <a class="login-brand" href="../index.html"><img src="../gprec-logo-enhanced.png" alt="G Pulla Reddy Engineering College"></a>
      <a class="login-home" href="../index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8M5 10v11h14V10M9 21v-6h6v6"/></svg>Home</a>
    </header>
    <main class="role-login-main">
      <section class="role-login-copy">
        <p class="eyebrow">Account Security</p>
        <h1>Verify your identity to reset your password.</h1>
        <p>Confirm your email and the recovery mobile number on file with the admin. Once verified, you can set a new password right away.</p>
      </section>
      <article class="portal-card role-login-card">
        <div class="portal-head">
          <span><svg><use href="#icon-key"></use></svg></span>
          <div>
            <h3>Forgot Password</h3>
            <p>Step 1: verify your identity.</p>
          </div>
        </div>
        <form class="portal-form" id="forgotIdentityForm">
          <label>Role
            <select id="forgotPasswordRole">
              <option value="admin">Admin</option>
              <option value="faculty">Faculty</option>
              <option value="non_teaching">Non-Teaching Staff</option>
            </select>
          </label>
          <label>College Email<input type="email" id="forgotPasswordEmail" placeholder="name@gprec.ac.in" autocomplete="username"></label>
          <label>Recovery Mobile<input type="tel" id="forgotPasswordMobile" placeholder="Mobile number on file" autocomplete="tel"></label>
          <button type="button" id="forgotIdentityButton">Verify Identity</button>
          <p class="portal-feedback is-hidden" id="forgotIdentityFeedback"></p>
        </form>
        <form class="portal-form is-hidden" id="forgotResetForm">
          <label>New Password<input type="password" id="forgotPasswordNew" placeholder="At least 8 characters" autocomplete="new-password"></label>
          <label>Confirm New Password<input type="password" id="forgotPasswordConfirm" placeholder="Re-enter new password" autocomplete="new-password"></label>
          <button type="submit" id="forgotResetButton">Set New Password</button>
          <p class="portal-feedback is-hidden" id="forgotResetFeedback"></p>
        </form>
      </article>
    </main>
    <script src="../script.js?v=20260722-29"></script>
  </body>
</html>
