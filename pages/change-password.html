<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password | GPREC</title>
    <meta name="description" content="Change your GPREC portal password.">
    <link rel="icon" href="https://www.gprec.ac.in/wp-content/uploads/2017/08/fav.png" sizes="32x32">
    <link rel="stylesheet" href="../styles.css">
  </head>
  <body class="login-page">
    <svg class="icon-sprite" aria-hidden="true" focusable="false">
      <symbol id="icon-key" viewBox="0 0 24 24"><path d="M14 8a5 5 0 1 0-1.4 3.5L21 20v-4h-4v-4h-4l-.4-.5A5 5 0 0 0 14 8Z"/></symbol>
    </svg>
    <header class="login-header">
      <a class="login-brand" href="../index.html"><img src="../gprec-logo-enhanced.png" alt="G Pulla Reddy Engineering College"></a>
      <a class="login-home" href="../index.html"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m3 11 9-8 9 8M5 10v11h14V10M9 21v-6h6v6"/></svg>Home</a>
    </header>
    <main class="role-login-main">
      <section class="role-login-copy">
        <p class="eyebrow">Account Security</p>
        <h1>Set a password only you know.</h1>
        <p>Your account was set up with a temporary password, or your current password has passed its 90-day limit. Choose a new password to continue to your dashboard.</p>
      </section>
      <article class="portal-card role-login-card">
        <div class="portal-head">
          <span><svg><use href="#icon-key"></use></svg></span>
          <div>
            <h3>Change Password</h3>
            <p id="changePasswordIntro">Enter your current password and choose a new one.</p>
          </div>
        </div>
        <form class="portal-form" id="changePasswordForm">
          <input type="text" id="changePasswordUsername" autocomplete="username" hidden>
          <label>Current Password<input type="password" id="changePasswordCurrent" placeholder="Current password" autocomplete="current-password"></label>
          <label>New Password<input type="password" id="changePasswordNew" placeholder="At least 8 characters" autocomplete="new-password"></label>
          <label>Confirm New Password<input type="password" id="changePasswordConfirm" placeholder="Re-enter new password" autocomplete="new-password"></label>
          <button type="submit" id="changePasswordButton">Update Password</button>
          <p class="portal-feedback is-hidden" id="changePasswordFeedback"></p>
        </form>
      </article>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
