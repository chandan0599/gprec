</div>
<script>
function uploadImg(input,box){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    box.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:contain;border-radius:inherit;" alt="img">';
  };
  r.readAsDataURL(f);
}
function addCompanySlot(){
  const row=document.getElementById('compRow');
  const btn=document.getElementById('addBtn');
  const count=row.querySelectorAll('.cslot').length+1;
  const id='cs'+count;
  const div=document.createElement('div');
  div.className='cslot';
  div.style.cssText='width:46px;height:32px;border-radius:5px;border:1.5px dashed #E85D04;background:#E85D0412;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;position:relative;overflow:hidden;flex-shrink:0;';
  div.id=id;
  div.innerHTML='<input type="file" accept="image/*" onchange="uploadImg(this,this.parentElement)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"><span style="font-size:14px;font-weight:700;color:#E85D04;">+</span><span style="font-size:6px;color:#E85D04;font-family:monospace;">Co.'+count+'</span>';
  row.insertBefore(div,btn);
}
</script>
